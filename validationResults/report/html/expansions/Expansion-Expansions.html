<!DOCTYPE html>
<html>
  <head>
    <title>Validation Report for Expansions</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <h1>Validation Report for Expansions</h1>
    <div>
      <script src="js/table_severity_filter.js"></script>
      Minimum severity shown:
      <select id="severity_filter" data-table-id="issue_table" onchange="filter_table_by_severity(this.getAttribute('data-table-id'))">
        <option value="info" selected="true">Info</option>
        <option value="warning">Warning</option>
        <option value="error">Error</option>
        <option value="fatal">Fatal</option>
      </select>
    </div>
    <div class="fullwidth">
      <script src="js/table_text_filter.js"></script>
      <input id="text_filter_input"  class="halfwidth" data-table-id="issue_table" onkeyup="filter_table_by_input(this.getAttribute('data-table-id'))" placeholder="Filter text ..."></input>
    </div>
    <div><div><!--<h1>Operation Outcome</h1>--><!--<select name="color"><option th:each="sevOpt : ${T(de.fraunhofer.fokus.espri.ntsvalidator.Testing).values()}"                th:value="${sevOpt}" th:text="${sevOpt}"></option></select>--><table id="issue_table"><thead><tr><th>Severity</th><th>Code</th><th>Detail</th><th>Location</th><th>Diagnostics</th></tr></thead><!--<tr th:each="issue, iterStat : ${resource.issue}" th:class="${iterStat.even}? 'even' : 'odd'">--><tbody><tr class="info"><td><div><div class="severity-icons"><img src="icons/info.svg" class="material-icons info" alt="info icon"/><span>Information</span></div></div></td><!--<td th:text="${issue.severityElement.value.display}"></td>--><td>INFORMATIONAL</td><td><div></div></td><td>[]</td><td>No issues detected during validation</td></tr></tbody></table></div></div>
  </body>
</html>
