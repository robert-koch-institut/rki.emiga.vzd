--- !<NAPI_PROFILE_GENERATION>
name: "flow_vzd_local"
description: "generates FHIR profiles for NAPI consumption"
keepTempFiles: false
profileSets:
- identifier: "rki.emiga.vzd"
  artifactRepo: "profile_vzd_fsh"
  localCopyLocation: null
  reference: "feature/profile-loader-temp"
  skipSanityCheckValidation: false
  ignoredSanityChecks:
  - name: "MatchingNameAndIdCheck"
    reasoning: "IDs are not matching the names as per NAPI naming conventions."
  - name: "ValidReferencedValueSetCheck"
    reasoning: "Referenced ValueSets must be valid."
  - name: "ValidUrlPatternCheck"
    reasoning: "URLs must follow a specific pattern."
  - name: "MatchingVersionAndIdCheck"
    reasoning: "Versions are not matching the IDs as per NAPI naming conventions."
  - name: "ExistenceOfValueSetCheck"
    reasoning: "Referenced ValueSets must exist."
  resourceBaseUrl: null
  skipFhirSchemaValidation: false
  skipExampleValidation: false
  qualityControl: []
  qualityControlRepos: []
  treatAsDependencyOnly: false
skipExampleValidation: false
skipFhirSchemaValidation: false
resourceParseMode: "STRICT"
fhirSchemaValidationMaxSeverity: "INFORMATION"
fhirExampleValidationMaxSeverity: null
output: "napi_output_location_vzd"
testFileDirectories: []
terminologyServers:
- "http://tx.fhir.org/r4"
valueSetExpansionIgnoreUrls:
- "http://ihe-d.de/ValueSets/IHEXDSeventCodeList"
loadNpmDependencies: true
snapshotDependenciesForSushi: true
enableTreeShaking: true
treeShakingWhitelistedResources: []
treeShakingIgnoredResources: []
alwaysOutputBuiltInsMatching: []
treeShakingTerminologyServerURL: ""
ntsPackages: []
additionalDependencies: []
excludeNpmDependencies: []
excludeExampleNpmDependencies: false
fhirValidationConfig: null
